name: Build Calypso APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04  # DO NOT CHANGE THIS - 22.04 is required for Buildozer
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --user --upgrade buildozer Cython==0.29.33 virtualenv

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # This line forces the build to accept all Android licenses automatically
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Calypso-Final-APK
          path: bin/*.apk
